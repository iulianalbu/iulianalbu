name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUMMARY_CARDS || secrets.GITHUB_TOKEN }}
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARDS || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: iulianalbu
      - name: Keep only transparent variant
        run: |
          find profile-summary-card-output -mindepth 1 -maxdepth 1 -type d ! -name transparent -exec rm -rf {} +
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          git diff --staged --quiet || git commit -m "Generate profile summary cards"
          git push
